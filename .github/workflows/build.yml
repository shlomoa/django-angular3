name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dev dependencies
      run: pip install -e ".[dev]"
    - name: Lint
      run: ruff check django_angular3 tests
    - name: Format check
      run: ruff format --check django_angular3 tests

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[yaml]
        pip install build

    - name: Run tests
      run: python -m unittest discover -s tests -p 'test*.py'

    - name: Build package
      run: python -m build

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install docs dependencies
      run: pip install -e ".[docs]"
    - name: Build docs
      run: python -m sphinx docs docs/_build/html -W --keep-going
