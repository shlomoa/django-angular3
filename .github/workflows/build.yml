name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build pytest django djangorestframework django-filter drf-spectacular PyYAML
        # Install the package itself in editable mode
        pip install -e .
        
    - name: Run tests
      run: |
        # Adjust test command based on how your tests are run
        python runtests.py || pytest tests/
        
    - name: Build package
      run: |
        python -m build

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install docs dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install -e ".[docs]"
    - name: Build docs
      run: python -m sphinx docs docs/_build/html -W --keep-going
